# Reference profile: Linux laptop with a mobile RTX 4090 (16 GB VRAM),
# 128 GB system RAM, NVMe. The "modest VRAM, big DDR" class — attention/KV
# and hot experts in VRAM, the routed expert pool in system RAM
# (--n-cpu-moe), NVMe as the streaming backstop.
# provenance.method is manual: capacities come from the machine's
# configuration; everything measurable is null until `frontier detect` runs
# on the real hardware and replaces this file.
