# Reference profile: Apple M5 Max, 128 GB unified memory, internal SSD, plus a
# Thunderbolt 5 external SSD (RFC 0002 external-tier example).
# provenance.method is manual: numbers here come from vendor specs or are null.
# The external drive's real tier position depends entirely on its measured
# link bandwidth — run `frontier detect` on the actual machine to find out.
