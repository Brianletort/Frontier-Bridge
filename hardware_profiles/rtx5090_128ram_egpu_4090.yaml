# Reference profile: Linux workstation with an internal RTX 5090 (32 GB VRAM),
# 128 GB system RAM, NVMe, plus an RTX 4090 (24 GB) in a Thunderbolt eGPU
# enclosure (RFC 0002 island example).
# provenance.method is manual: numbers here come from vendor specs or are null.
# The eGPU's VRAM is fast locally but sits behind the Thunderbolt tunnel — the
# planner places a fixed expert subset there as a resident island rather than
# streaming across the link per token.
schema_version: hwprofile/v1
profile_id: rtx5090_128ram_egpu_4090
provenance:
  method: manual
  detected_at: null
  tool_version: null
  os:
    family: linux
    version: null
    kernel: null

nodes:
