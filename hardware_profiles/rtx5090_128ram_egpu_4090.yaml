    kind: compute
    class: cpu
    vendor: null
    arch: null
    model: null
    cores: null
    numa_nodes: 1
  - id: gpu0
    kind: compute
    class: gpu
    vendor: nvidia
    arch: blackwell
    model: RTX 5090
    api:
      cuda: unverified
      sm: null
    rated:
      fp16_tflops: null
  - id: vram0
    kind: memory
    class: device_local
    capacity_gb: 32
    bandwidth_gbps:
      rated: null
      measured: null
    attached_to: gpu0
  - id: gpu1
    kind: compute
    class: gpu
    vendor: nvidia
    arch: ada
    model: RTX 4090 (eGPU enclosure)
    api:
      cuda: unverified
      sm: null
    rated:
