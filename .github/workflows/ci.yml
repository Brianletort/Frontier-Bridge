name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Tests
        run: pytest
      - name: Schema validation
        run: frontier validate .
      - name: Runbook provenance gate
        run: frontier runbook verify
      - name: Planner smoke test
        run: |
          frontier catalog hardware
          frontier catalog models
          frontier plan glm-5.2 --hardware m5_max_128gb --workload coding_agent --ctx 32768
